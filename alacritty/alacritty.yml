font:
  size: 12.0
  offset:
    y: 14
  glyph_offset:
    y: 7
  normal:
    family: Menlo
  use_thin_strokes: true
key_bindings:
  - { key: F, mods: Command, action: ToggleFullscreen }
  - { key: Up, mods: Shift, action: ScrollPageUp }
  - { key: Down, mods: Shift, action: ScrollPageDown }
scrolling:
  history: 10000
