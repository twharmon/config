font:
  size: 12.0
  offset:
    y: 20
    x: 1
  glyph_offset:
    y: 10
  normal:
    family: Fira Code
    style: Retina
  bold:
    family: Fira Code
    style: Bold
  italic:
    family: Fira Code
    style: Italic
  use_thin_strokes: true
key_bindings:
  - { key: F, mods: Command, action: ToggleFullscreen }
  - { key: Up, mods: Shift, action: ScrollPageUp }
  - { key: Down, mods: Shift, action: ScrollPageDown }
scrolling:
  history: 10000
